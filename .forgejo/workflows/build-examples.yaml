name: Build & upload example bundles

# Compiles the curated paradoc example docs and uploads each bundle to
# the configured object store. Mirrors build-paradoc.yaml — every
# infrastructure detail (endpoint, bucket, credentials) comes from
# Forgejo secrets so the workflow file itself reveals nothing.
#
# The act-style runner is minimal (no curl, no host bind-mounts that
# the outer docker daemon can see), but it does have docker. Compile
# inside an image built from Dockerfile.examples; upload by `docker run`
# of that same image with the secrets passed as env. Skipped cleanly
# when the upload secrets aren't configured.

on:
  workflow_dispatch:
  push:
    branches: [feat/figure-sources]
    paths:
      - 'files/**'
      - 'scripts/compile_examples.py'
      - 'scripts/upload_examples.py'
      - 'src/paradoc/**'
      - 'pixi.toml'
      - 'pixi.lock'
      - 'pyproject.toml'
      - 'Dockerfile.examples'
      - '.forgejo/workflows/build-examples.yaml'

jobs:
  build-and-upload:
    runs-on: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Resolve adapy commit SHA for layer cache key
        # The docker layer cache was being invalidated on every push
        # because `CACHE_BUST=${{ github.run_id }}` changes every run,
        # which cascaded through the clone → pixi install → compile
        # layers and bought us nothing on adapy-unchanged pushes
        # (which is most of them). Resolve adapy's current tip SHA
        # via `git ls-remote` instead — same value across runs while
        # adapy stays still, distinct value the moment it moves.
        #
        # The runner has docker but not git, so shell out to the
        # alpine/git image. ~30 MB pull on first run, cached after.
        id: adapy_sha
        env:
          ADAPY_GIT_URL: ${{ secrets.ADAPY_GIT_URL }}
          ADAPY_REF: ${{ vars.ADAPY_REF || 'main' }}
        run: |
          if [ -z "$ADAPY_GIT_URL" ]; then
            echo "::error::ADAPY_GIT_URL secret is required."
            exit 1
          fi
          SHA=$(docker run --rm alpine/git ls-remote "$ADAPY_GIT_URL" "$ADAPY_REF" 2>/dev/null | awk '{print $1}' | head -n1 || true)
          if [ -z "$SHA" ]; then
            # Fallback to the ref name itself so the layer still
            # invalidates per-distinct-ref even when ls-remote fails
            # (DNS hiccup / image pull blocked / etc.).
            SHA="$ADAPY_REF"
            echo "::warning::ls-remote returned nothing for $ADAPY_REF; falling back to ref name as cache key."
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved adapy $ADAPY_REF → $SHA"

      - name: Build examples image (compiles bundles in-layer)
        env:
          # Sibling adapy clone fed into the image. The pixi `examples-figs`
          # env now uses `ada-py = { path = "../adapy", editable = true }`
          # instead of a git SHA, so the build context must include adapy.
          # URL comes from a workflow secret to keep the source-host name
          # out of the file. ADAPY_REF defaults to main; override per
          # workflow run if you need to test a feature branch.
          ADAPY_GIT_URL: ${{ secrets.ADAPY_GIT_URL }}
          ADAPY_REF: ${{ vars.ADAPY_REF || 'main' }}
        run: |
          if [ -z "$ADAPY_GIT_URL" ]; then
            echo "::error::ADAPY_GIT_URL secret is required to build the examples image."
            exit 1
          fi
          docker build \
            -f Dockerfile.examples \
            --build-arg ADAPY_GIT_URL="$ADAPY_GIT_URL" \
            --build-arg ADAPY_REF="$ADAPY_REF" \
            --build-arg CACHE_BUST="${{ steps.adapy_sha.outputs.sha }}" \
            -t paradoc-examples:ci .

      - name: Upload bundles to object store
        env:
          S3_ENDPOINT_URL: ${{ secrets.EXAMPLES_S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.EXAMPLES_S3_BUCKET }}
          S3_PREFIX: ${{ secrets.EXAMPLES_S3_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.EXAMPLES_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.EXAMPLES_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.EXAMPLES_AWS_REGION }}
        run: |
          MISSING=""
          for v in S3_ENDPOINT_URL S3_BUCKET AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
            eval "val=\$$v"
            [ -z "$val" ] && MISSING="$MISSING $v"
          done
          if [ -n "$MISSING" ]; then
            echo "Missing upload secrets:$MISSING — skipping upload (compile artifacts kept in image)."
            exit 0
          fi
          docker run --rm \
            -e S3_ENDPOINT_URL -e S3_BUCKET -e S3_PREFIX \
            -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_REGION \
            paradoc-examples:ci

      - name: Clean up image
        if: always()
        run: docker rmi paradoc-examples:ci || true
