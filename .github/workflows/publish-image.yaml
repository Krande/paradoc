name: Publish image

# Builds the `paradoc-serve` image (Dockerfile) and pushes it to this
# repo's GitHub Container Registry namespace (ghcr.io/<owner>/<repo>).
# Auth is the built-in GITHUB_TOKEN — no external secrets required.
#
#   push to main   → :main and :sha-<short>
#   push tag v1.2.3 → :1.2.3, :1.2, :latest and :sha-<short>
#   manual dispatch → :<branch> and :sha-<short> (build from any ref)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # `latest` follows the highest semver tag (flavor default
          # latest=auto), so main/dispatch builds never move it.
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Record build timestamp
        run: echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TAG=${{ steps.meta.outputs.version }}
            BUILD_TIME=${{ env.BUILD_TIME }}
          # Reuse layers across runs so the heavy pixi/conda + npm stages
          # don't rebuild when only source changes.
          cache-from: type=gha
          cache-to: type=gha,mode=max
