name: ci-branch-tests


on: push

concurrency:
  group: paradoc-quick-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6 # https://github.com/prefix-dev/setup-pixi
        with:
          pixi-version: v0.68.0
          environments: test
          cache: true

      - name: Runs Tests
        # Explicit env: the `test` task is also provided by the `e2e`
        # environment (it shares the `test` feature), so a bare
        # `pixi run test` is ambiguous. Serve/e2e-only tests skip
        # cleanly here via `pytest.importorskip` (fastapi/uvicorn).
        run: pixi run -e test test