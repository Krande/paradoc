<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="data-appendix-start" content="Appendix" />
    <title>Paradoc Reader</title>
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-900">
    <div id="root"></div>
    <!--
      Hosted REST mode injects window.__PARADOC_CONFIG__ via /config.js.
      In Vite dev or static builds this 404s and onerror removes the tag
      so the comms picker falls back to ws / static autodetect.
    -->
    <script src="/config.js" onerror="this.remove()"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
