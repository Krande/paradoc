<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <style>
    .fg { stroke: #101113; fill: none; }
    @media (prefers-color-scheme: dark) {
      .fg { stroke: #e7e8ea; }
    }
  </style>
  <!-- Stroked document with folded corner + an upward sparkline inside.
       Matches shelf's stroked-outline style; the sparkline marks paradoc
       as "live engineering report" and keeps it visually distinct from
       shelf (book) and adapy (I-beam). -->
  <g class="fg" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 3 H14 L19 8 V21 H5 Z"/>
    <path d="M14 3 V8 H19"/>
    <path d="M7 17 L10 13 L13 15 L17 10"/>
  </g>
</svg>
